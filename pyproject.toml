[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentic-trader"
version = "0.1.0"
description = "A guardrailed multi-agent paper trading system built around local LLMs."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "duckdb>=1.2.2",
  "httpx>=0.28.1",
  "pandas>=2.2.3",
  "pydantic>=2.11.0",
  "pydantic-settings>=2.8.1",
  "rich>=14.0.0",
  "typer>=0.15.2",
  "yfinance>=0.2.58",
]

[project.optional-dependencies]
dev = [
  "pexpect>=4.9.0",
  "pytest>=8.3.5",
  "pytest-cov>=6.0.0",
  "pyright>=1.1.408",
  "ruff>=0.11.2",
]

[project.scripts]
agentic-trader = "agentic_trader.cli:app"

[tool.setuptools.packages.find]
include = ["agentic_trader*"]

[tool.setuptools.package-data]
agentic_trader = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]