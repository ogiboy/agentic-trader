[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "agentic-trader"
version = "0.1.0"
description = "A guardrailed multi-agent paper trading system built around local LLMs."
authors = [
    {name = "Oğuzcan Toptaş",email = "oguzcantoptas@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.12,<4.0.0,<3.15"
dependencies = [
  "duckdb>=1.2.2",
  "httpx>=0.28.1",
  "pandas>=2.2.3",
  "pydantic>=2.11.0",
  "pydantic-settings>=2.8.1",
  "rich>=14.0.0",
  "typer>=0.15.2",
  "yfinance>=0.2.58",
  "alpaca-py (>=0.43.2,<0.44.0)",
  "massive (>=2.5.0,<3.0.0)",
]

[project.optional-dependencies]
dev = [
  "pexpect>=4.9.0",
  "pytest>=8.3.5",
  "pytest-cov>=6.0.0",
  "pyright>=1.1.408",
  "ruff>=0.11.2",
]

[project.scripts]
agentic-trader = "agentic_trader.cli:app"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[dependency-groups]
dev = [
    "pyinstaller (>=6.20.0,<7.0.0)"
]
