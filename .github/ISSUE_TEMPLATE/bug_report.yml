name: Bug report
description: Report a reproducible problem in the CLI, runtime, Web GUI, or docs.
title: 'fix: '
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands, symbols, branch, and environment details when relevant.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste the relevant error, log tail, or screenshot.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Python CLI
        - Ink TUI
        - Rich menu
        - Runtime / daemon
        - Web GUI
        - Docs
        - CI/CD
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, Node, Poetry, pnpm, branch, and model/provider context.
