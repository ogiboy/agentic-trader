name: CI

on:
  push:
    branches: [main, webgui, devdocs, V1]
  pull_request:
    branches: [main, webgui, devdocs, V1]
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_VERSION: '0.11.8'
  PNPM_VERSION: '10.33.2'

jobs:
  python:
    name: Python Core
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --python 3.12 --all-extras --group dev

      - name: Check uv lock metadata
        run: uv lock --check

      - name: Run Ruff
        run: uv run --locked --no-sync ruff check .

      - name: Run Pyright
        run: uv run --locked --no-sync pyright agentic_trader tests scripts

      - name: Run Pytest
        run: uv run --locked --no-sync python -m pytest -q

      - name: Build PyInstaller smoke binary
        run: |
          uv run --locked --no-sync pyinstaller --clean --noconfirm agentic-trader.spec
          ./dist/agentic-trader doctor --json

  webgui:
    name: Web GUI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Web GUI dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Web GUI
        run: pnpm --filter webgui run lint

      - name: Typecheck Web GUI
        run: pnpm --filter webgui run typecheck

      - name: Build Web GUI
        run: pnpm --filter webgui run build

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint docs
        run: pnpm --filter docs run lint

      - name: Typecheck docs
        run: pnpm --filter docs run typecheck

      - name: Build docs static export
        env:
          GITHUB_PAGES: 'true'
        run: pnpm --filter docs run build

  terminal-ui:
    name: Terminal UI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install TUI dependencies
        run: pnpm install --frozen-lockfile

      - name: Syntax-check TUI entrypoint
        run: pnpm --filter agentic-trader-tui exec node --check index.mjs
