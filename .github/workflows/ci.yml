name: CI

on:
  push:
    branches: [main, webgui, devdocs, V1]
  pull_request:
    branches: [main, webgui, devdocs, V1]
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_VERSION: '0.11.8'

jobs:
  security:
    name: Security Gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Run security gates
        run: pnpm run security:check

  python:
    name: Python Core
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: '.python-version'

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --python "$(cat .python-version)" --all-extras --group dev

      - name: Check uv lock metadata
        run: uv lock --check

      - name: Run Ruff
        run: uv run --locked --no-sync ruff check .

      - name: Run strict Pyright gate
        run: uv run --locked --no-sync python scripts/check_pyright_baseline.py agentic_trader tests scripts sidecars/research_flow/src

      - name: Run modularity/i18n gate
        run: uv run --locked --no-sync python scripts/qa/modularity_i18n_audit.py --fail-on-findings

      - name: Run Pytest
        run: uv run --locked --no-sync python -m pytest -q

      - name: Build PyInstaller smoke binary
        run: |
          uv run --locked --no-sync pyinstaller --clean --noconfirm agentic-trader.spec
          ./dist/agentic-trader doctor --json

  webgui:
    name: Web GUI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Web GUI dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Web GUI
        run: pnpm --filter webgui run lint

      - name: Typecheck Web GUI
        run: pnpm --filter webgui run typecheck

      - name: Build Web GUI
        run: pnpm --filter webgui run build

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint docs
        run: pnpm --filter docs run lint

      - name: Typecheck docs
        run: pnpm --filter docs run typecheck

      - name: Build docs static export
        env:
          GITHUB_PAGES: 'true'
        run: pnpm --filter docs run build

  terminal-ui:
    name: Terminal UI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install TUI dependencies
        run: pnpm install --frozen-lockfile

      - name: Syntax-check TUI entrypoint
        run: pnpm --filter agentic-trader-tui exec node --check index.mjs
