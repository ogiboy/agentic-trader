name: CI

on:
  push:
    branches: [main, webgui, devdocs, V1]
  pull_request:
    branches: [main, webgui, devdocs, V1]
  workflow_dispatch:

permissions:
  contents: read

env:
  POETRY_VERSION: "2.3.4"
  PNPM_VERSION: "10.33.2"

jobs:
  python:
    name: Python Core
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${POETRY_VERSION}"

      - name: Install Python dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --with dev --extras dev

      - name: Check Poetry metadata
        run: poetry check --lock

      - name: Run Ruff
        run: poetry run ruff check .

      - name: Run Pyright
        run: poetry run pyright agentic_trader tests scripts

      - name: Run Pytest
        run: poetry run python -m pytest -q

      - name: Build PyInstaller smoke binary
        run: |
          poetry run pyinstaller --clean --onefile --name agentic-trader-smoke main.py
          ./dist/agentic-trader-smoke doctor --json

  webgui:
    name: Web GUI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Web GUI dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Web GUI
        run: pnpm --filter webgui run lint

      - name: Typecheck Web GUI
        run: pnpm --filter webgui run typecheck

      - name: Build Web GUI
        run: pnpm --filter webgui run build

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint docs
        run: pnpm --filter docs run lint

      - name: Typecheck docs
        run: pnpm --filter docs run typecheck

      - name: Build docs static export
        env:
          GITHUB_PAGES: "true"
        run: pnpm --filter docs run build

  terminal-ui:
    name: Terminal UI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install TUI dependencies
        run: pnpm install --frozen-lockfile

      - name: Syntax-check TUI entrypoint
        run: pnpm --filter agentic-trader-tui exec node --check index.mjs
