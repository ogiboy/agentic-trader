name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  UV_VERSION: "0.11.8"

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install release dependencies
        run: uv sync --locked --python "$(cat .python-version)" --all-extras --group dev

      - name: Configure release Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate package before release
        run: |
          uv lock --check
          uv run --locked --no-sync python scripts/release/check_changelog_marker.py
          uv run --locked --no-sync python scripts/release/check_conventional_release_commits.py
          uv run --locked --no-sync python scripts/qa/modularity_i18n_audit.py --fail-on-findings
          uv run --locked --no-sync ruff check .
          uv run --locked --no-sync python scripts/check_pyright_baseline.py agentic_trader tests scripts sidecars/research_flow/src
          uv run --locked --no-sync python -m pytest -q
          pnpm run check:node
          pnpm run build:docs:pages

      - name: Detect release tag
        id: release-plan
        run: |
          set +e
          raw_tag="$(
            uv run --locked --no-sync semantic-release --noop version --print-tag 2>/dev/null \
              | grep -E '^v[0-9]+(\.[0-9]+){2}([-.+][0-9A-Za-z.-]+)?$' \
              | tail -n 1
          )"
          status=$?
          set -e
          if [ "$status" -ne 0 ] || [ -z "$raw_tag" ]; then
            echo "will_release=false" >> "$GITHUB_OUTPUT"
            echo "baseline_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          plan_json="$(uv run --locked --no-sync python scripts/release/version_plan.py --semantic-tag "$raw_tag")"
          floor_applied="$(uv run --locked --no-sync python -c 'import json,sys; print(str(json.load(sys.stdin)["semantic_floor_applied"]).lower())' <<< "$plan_json")"
          artifact_tag="$(uv run --locked --no-sync python -c 'import json,sys; print(json.load(sys.stdin)["artifact_version"])' <<< "$plan_json")"
          if [ "$floor_applied" = "true" ]; then
            if git rev-parse -q --verify "refs/tags/$artifact_tag" >/dev/null; then
              echo "semantic-release proposed $raw_tag, which is below the pyproject baseline, and $artifact_tag already exists."
              echo "will_release=false" >> "$GITHUB_OUTPUT"
              echo "baseline_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "semantic-release proposed $raw_tag, which is below the pyproject baseline. Creating baseline tag $artifact_tag."
            echo "will_release=true" >> "$GITHUB_OUTPUT"
            echo "baseline_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=$artifact_tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "will_release=true" >> "$GITHUB_OUTPUT"
          echo "baseline_release=false" >> "$GITHUB_OUTPUT"
          echo "tag=$raw_tag" >> "$GITHUB_OUTPUT"

      - name: Bump version, changelog, lockfiles, and tag
        if: ${{ steps.release-plan.outputs.will_release == 'true' && steps.release-plan.outputs.baseline_release != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.release-plan.outputs.tag }}"
          uv run --locked --no-sync semantic-release version --no-commit --no-tag --no-push --no-vcs-release
          uv run --locked --no-sync python scripts/release/fill_stable_changelog.py --version "$tag"
          uv lock
          git add \
            CHANGELOG.md \
            agentic_trader/__init__.py \
            docs/package.json \
            package.json \
            pyproject.toml \
            sidecars/research_flow/pyproject.toml \
            tui/package.json \
            uv.lock \
            webgui/package.json
          if git diff --cached --quiet; then
            echo "No release files changed; skipping release commit and tag."
            exit 0
          fi
          git commit -m "chore(release): ${tag}"
          git tag -a "${tag}" -m "chore(release): ${tag}"
          git push origin "HEAD:${GITHUB_REF_NAME}" "refs/tags/${tag}"

      - name: Create baseline changelog and tag
        if: ${{ steps.release-plan.outputs.will_release == 'true' && steps.release-plan.outputs.baseline_release == 'true' }}
        run: |
          set -euo pipefail
          tag="${{ steps.release-plan.outputs.tag }}"
          uv run --locked --no-sync python scripts/release/bootstrap_changelog.py --version "$tag"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): ${tag}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists locally; skipping baseline tag creation."
            exit 0
          fi
          git tag -a "${tag}" -m "chore(release): ${tag}"
          git push origin "refs/tags/${tag}"

      - name: Dispatch binary packaging
        if: ${{ steps.release-plan.outputs.will_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run binaries.yml --ref main -f tag="${{ steps.release-plan.outputs.tag }}"
