name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, webgui, devdocs, V1]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  UV_VERSION: "0.11.8"
  SONAR_HOST_URL: https://sonarcloud.io
  SONAR_ORGANIZATION: ogiboy
  SONAR_PROJECT_KEY: ogiboy_agentic-trader

jobs:
  scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --python "$(cat .python-version)" --all-extras --group dev

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Python coverage
        run: |
          mkdir -p .ai/qa/artifacts/sonar
          uv run --locked --no-sync python -m pytest -q -p no:cacheprovider --cov=agentic_trader --cov-report=xml:.ai/qa/artifacts/sonar/coverage.xml

      - name: Generate Web GUI coverage
        run: pnpm run test:webgui:coverage

      - name: Run SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ env.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ env.SONAR_PROJECT_KEY }}
          SONAR_ARTIFACT_DIR: .ai/qa/artifacts/sonar
          SONAR_COVERAGE_XML: .ai/qa/artifacts/sonar/coverage.xml
          SONAR_JAVASCRIPT_LCOV: .ai/qa/artifacts/sonar/webgui-coverage/lcov.info
          SONAR_SKIP_COVERAGE: "1"
        run: scripts/qa/run_sonar_scan.sh pysonar

      - name: Explain skipped SonarCloud scan
        if: ${{ env.SONAR_TOKEN == '' }}
        run: |
          echo "Skipping SonarCloud scan because the SONAR_TOKEN repository secret is not configured."
          echo "Local Docker SonarQube analysis is run with pnpm run sonar and is not reachable from GitHub-hosted runners."
