name: Binaries

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional release tag to build and attach assets for, for example v0.2.0'
        required: false
        type: string
      channel:
        description: 'Override artifact channel for manual branch builds'
        required: false
        default: auto
        type: choice
        options:
          - auto
          - stable
          - next
          - beta

permissions:
  contents: write

concurrency:
  group: binaries-${{ github.ref }}-${{ github.event.inputs.tag || 'branch' }}
  cancel-in-progress: false

env:
  POETRY_VERSION: '2.3.4'

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS Apple Silicon
            asset_suffix: macos-arm64
            extension: ''
          - os: windows-latest
            label: Windows
            asset_suffix: windows-x64
            extension: '.exe'

    steps:
      - name: Resolve checkout ref
        id: ref
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          release_ref=""
          checkout_ref="${GITHUB_REF_NAME}"
          ref_name="${GITHUB_REF_NAME}"

          if [ -n "${INPUT_TAG}" ]; then
            release_ref="${INPUT_TAG}"
            checkout_ref="${INPUT_TAG}"
            ref_name="${INPUT_TAG}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            release_ref="${GITHUB_REF_NAME}"
          fi

          echo "checkout_ref=${checkout_ref}" >> "$GITHUB_OUTPUT"
          echo "release_ref=${release_ref}" >> "$GITHUB_OUTPUT"
          echo "ref_name=${ref_name}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Poetry
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${POETRY_VERSION}"

      - name: Install packaging dependencies
        shell: bash
        run: |
          poetry config virtualenvs.in-project true
          poetry install --with dev --extras dev

      - name: Detect semantic tag candidate
        id: semantic
        shell: bash
        env:
          RELEASE_REF: ${{ steps.ref.outputs.release_ref }}
        run: |
          set -euo pipefail
          tag="${RELEASE_REF}"
          if [ -z "$tag" ]; then
            set +e
            tag="$(
              poetry run semantic-release --noop version --print-tag 2>/tmp/semantic-release-preview.log \
                | grep -E '^v[0-9]+(\.[0-9]+){2}([-.+][0-9A-Za-z.-]+)?$' \
                | tail -n 1
            )"
            set -e
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Compute artifact version
        id: plan
        shell: bash
        env:
          RELEASE_REF: ${{ steps.ref.outputs.release_ref }}
          REF_NAME: ${{ steps.ref.outputs.ref_name }}
          SEMANTIC_TAG: ${{ steps.semantic.outputs.tag }}
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          set -euo pipefail
          args=(
            --semantic-tag "$SEMANTIC_TAG"
            --release-ref "$RELEASE_REF"
            --ref-name "$REF_NAME"
            --format github
          )
          if [ -n "${CHANNEL}" ] && [ "${CHANNEL}" != "auto" ]; then
            args+=(--channel "$CHANNEL")
          fi
          python scripts/release/version_plan.py "${args[@]}"

      - name: Build CLI binary
        shell: bash
        run: poetry run pyinstaller --clean --noconfirm agentic-trader.spec

      - name: Smoke-test CLI binary
        shell: bash
        run: './dist/agentic-trader${{ matrix.extension }} doctor --json'

      - name: Package binary asset
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          asset_base="agentic-trader-${{ matrix.asset_suffix }}-${{ steps.plan.outputs.artifact_version }}"
          binary="dist/agentic-trader${{ matrix.extension }}"
          staged="release/${asset_base}${{ matrix.extension }}"
          cp "$binary" "$staged"

          if [ "${{ runner.os }}" = "Windows" ]; then
            archive="release/${asset_base}.zip"
            7z a "$archive" "$staged"
          else
            archive="release/${asset_base}.tar.gz"
            tar -czf "$archive" -C release "$(basename "$staged")"
          fi

          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_suffix }}-${{ steps.plan.outputs.artifact_version }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach binary to GitHub Release
        if: ${{ steps.plan.outputs.attach_to_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.plan.outputs.release_ref }}
        run: |
          set -euo pipefail
          for attempt in {1..18}; do
            if gh release view "$TAG" >/dev/null 2>&1; then
              break
            fi
            sleep 10
          done
          gh release view "$TAG" >/dev/null
          gh release upload "$TAG" "${{ steps.package.outputs.archive }}" --clobber
