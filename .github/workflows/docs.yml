name: Docs

on:
  push:
    branches: [main, devdocs, V1]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, devdocs, V1]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build GitHub Pages artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint docs
        run: pnpm --filter docs run lint

      - name: Typecheck docs
        run: pnpm --filter docs run typecheck

      - name: Build static docs
        env:
          GITHUB_PAGES: 'true'
        run: pnpm --filter docs run build

      - name: Verify static export
        run: |
          test -f docs/out/index.html
          test -f docs/out/en/index.html
          test -f docs/out/tr/index.html
          test -f docs/out/api/search
          test -f docs/out/favicon.ico
          test -f docs/out/favicon-16x16.png
          test -f docs/out/favicon-32x32.png
          test -f docs/out/apple-touch-icon.png
          test -f docs/out/android-chrome-192x192.png
          test -f docs/out/android-chrome-512x512.png
          test -f docs/out/site.webmanifest

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/out

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'push' && github.ref == 'refs/heads/V1' }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy docs
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
