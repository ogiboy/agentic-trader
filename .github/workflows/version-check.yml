name: Version Check

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  POETRY_VERSION: "2.3.4"

jobs:
  version-plan:
    name: Preview semantic version
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${POETRY_VERSION}"

      - name: Install release dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --with dev --extras dev

      - name: Detect next semantic tag
        id: semantic
        shell: bash
        run: |
          set +e
          tag="$(
            poetry run semantic-release --noop version --print-tag 2>/tmp/semantic-release-preview.log \
              | grep -E '^v[0-9]+(\.[0-9]+){2}([-.+][0-9A-Za-z.-]+)?$' \
              | tail -n 1
          )"
          status=$?
          set -e
          if [ "$status" -ne 0 ] || [ -z "$tag" ]; then
            echo "No semantic-release tag candidate was produced." >> "$GITHUB_STEP_SUMMARY"
            sed 's/^/> /' /tmp/semantic-release-preview.log >> "$GITHUB_STEP_SUMMARY" || true
            tag=""
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Compute branch build identity
        id: plan
        run: |
          python scripts/release/version_plan.py \
            --semantic-tag "${{ steps.semantic.outputs.tag }}" \
            --format github

      - name: Write version summary
        run: |
          python scripts/release/version_plan.py \
            --semantic-tag "${{ steps.semantic.outputs.tag }}" \
            --format summary >> "$GITHUB_STEP_SUMMARY"
