version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5

  # GitHub Dependabot uses the `npm` ecosystem value for pnpm projects.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 5
    groups:
      next-apps:
        patterns:
          - next
          - react
          - react-dom
          - eslint*
          - "@types/*"
    ignore:
      # @sonar/scan pins adm-zip@0.5.17; the pnpm workspace override enforces
      # the patched 0.6.0 release instead.
      - dependency-name: adm-zip
      # eslint-plugin-react@7.37.5 is still pulled by eslint-config-next@16.2.7
      # and is not compatible with ESLint 10 rule-context APIs.
      - dependency-name: eslint
        update-types:
          - version-update:semver-major

  # Python dependencies are uv-owned in this repo, so use the native `uv`
  # ecosystem instead of the older `pip` fallback.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5
