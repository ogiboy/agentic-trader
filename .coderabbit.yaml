    - "!**/*.out"
    - "!**/*.ppt"
    - "!**/*.pptx"
    - "!**/*.pkl"
    - "!**/*.pickle"
    - "!**/*.pyc"
    - "!**/*.pyd"
    - "!**/*.pyo"
